name: fitapp
description: "AI Workout Coach - Powered by Gemini AI & ML Pose Detection"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  camera: ^0.12.0
  google_mlkit_pose_detection: ^0.14.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^1.2.0
  permission_handler: ^12.0.1
  http: ^1.6.0
  lottie: ^3.1.3
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/